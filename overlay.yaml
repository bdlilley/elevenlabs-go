overlay: 1.0.0
info:
  title: Add ElevenLabs API Key Security
  version: 0.0.1
actions:
  - target: $.components
    update:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: xi-api-key
          x-speakeasy-example: YOUR_API_KEY
  - target: $
    update:
      security:
        - apiKey: []