overlay: 1.0.0
info:
  title: Add ElevenLabs API Key Security
  version: 0.0.2
actions:
  - target: $.components
    update:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: xi-api-key
          x-speakeasy-example: YOUR_API_KEY
  - target: $
    update:
      security:
        - apiKey: []
      servers:
        - url: https://api.elevenlabs.io
          description: ElevenLabs API
  - target: $.paths[*][*].parameters[?(@.name == 'xi-api-key')]
    remove: true
  - target: "$.components.schemas['AgentConfigAPIModel-Input'].properties.dynamic_variables"
    update:
      type: object
      additionalProperties: true
  - target: "$.components.schemas['AgentConfigAPIModel-Output'].properties.dynamic_variables"
    update:
      type: object
      additionalProperties: true
  - target: "$.components.schemas['AgentConfigAPIModelWorkflowOverride-Input'].properties.dynamic_variables"
